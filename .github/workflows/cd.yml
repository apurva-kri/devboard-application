#Goal: we will run our job on this self-hosted runner using docker compose
name: CD

on: 
  workflow_call

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: checkout code
        uses: actions/checkout@v7

      - name: copy example.env to .env
        run: cp .env.example .env

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy the container with docker compose
        run: |
          docker compose pull      
          docker compose up -d



      