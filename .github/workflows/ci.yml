# Goal - I have to Lint, Build, Test the code for Frontend & Backend
# then Push the images to DockerHub 
name: CI

on:
  push:
    branches: [advanced]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7
      
      # Step 2: Provision the specified Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Automates npm dependency caching to speed up workflows
          cache-dependency-path: frontend/package-lock.json
    # Step 3: Clean install dependencies using package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: run linter
        run: npm run lint
        working-directory: frontend

    # Step 5: Run your test suite
      - name: Run tests
        run: npm run test
        working-directory: frontend

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7 
        with:
          context: ./frontend
          push: true
          tags: twsdocker1/devboard-application-fe-master:latest  #username/app:latest


