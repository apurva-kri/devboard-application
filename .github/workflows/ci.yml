# Goal: build the image for DevBoard frontend and push to Docker Hub, after linting the code
name: CI

on:
  push:
    branches: [master]

jobs:
  code-lint: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Specify your project's Node version
          cache: 'npm'       # Automatically caches npm dependencies for speed

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint Check
        run: npm run lint

  build-and-push:
    needs: [code-lint]
    runs-on: ubuntu-latest
    steps:
      - name: checkout/clone the code
        uses: actions/checkout@v4

      - name: Debug
        run: echo "USERNAME=${{ vars.DOCKERHUB_USERNAME }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Show Tag
        run: |
          echo "${{ vars.DOCKERHUB_USERNAME }}/devboard-application-fe-master:latest"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: twsdocker1/devboard-application-fe-master:latest
        
      


