# Goal: build the image for DevBoard frontend and push to Docker Hub
name: CI

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout/clone the code
        uses: actions/checkout@v4

      - name: Debug
        run: echo "USERNAME=${{ vars.DOCKERHUB_USERNAME }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Show Tag
        run: echo "${{ vars.DOCKERHUB_USERNAME }}/devboard-application-fe-master:latest"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-application-fe-master:latest
        
      


